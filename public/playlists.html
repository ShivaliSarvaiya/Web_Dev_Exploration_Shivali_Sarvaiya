<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Book-Themed Playlists</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://use.typekit.net/xzh5etg.css" />
</head>

<body>
  <header>
    <!-- SAME Profile ▼ dropdown used on other pages -->
    <div class="profile-menu">
      <button id="profileButton" onclick="toggleProfileMenu()">
        <span id="currentUser">Profile</span> ▼
      </button>

      <div id="profileDropdown" class="profile-dropdown">
        <input
          id="usernameInput"
          placeholder="Enter name"
          autocomplete="new-password"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"
          name="profile_name_input_playlists"
        />
        <button onclick="saveUser()">Save Profile</button>

        <hr />
        <p>Theme</p>
        <button onclick="setTheme('light')">Light</button>
        <button onclick="setTheme('dark')">Dark</button>

        <hr />
        <button onclick="logout()">Sign Out</button>
      </div>
    </div>

    <h1>everything books!</h1>

    <nav>
      <a href="index.html">Intro</a>
      <a href="authors.html">Best Authors</a>
      <a href="books.html">Book List</a>
      <a href="game.html">Guess Game!</a>
      <a href="bookstores.html">Bookstores</a>
      <a href="aesthetics_gallery.html">Gallery</a>
      <a href="playlists.html" class="active">Playlist Maker!</a>
    </nav>
  </header>

  <main>
    <section class="card playlist-form">
      <h2>Create a Playlist</h2>
      <input id="playlist-name" placeholder="Playlist name" />
      <button id="create-playlist" type="button">Create Playlist</button>
    </section>

    <!-- script.js will render each playlist here with:
         - Song name input
         - "Add Song" button
         - "❌" buttons per song
    -->
    <section id="playlists-container"></section>
  </main>

  <!-- IMPORTANT: Only include the shared script. No inline JS here. -->
  <script src="script.js" defer></script>
</body>
</html>
