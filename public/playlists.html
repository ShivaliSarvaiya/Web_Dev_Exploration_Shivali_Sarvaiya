  <!-- Form to create a new playlist -->
  <div class="playlist-form">
    <input type="text" id="playlist-name" placeholder="Playlist name (book title)">
    <button id="create-playlist">Create Playlist</button>
  </div>

  <!-- Container for all playlists -->
  <div id="playlists-container"></div>

  <script>
    const playlistsContainer = document.getElementById('playlists-container');
    const createBtn = document.getElementById('create-playlist');

    let playlists = [];

    // Create new playlist
    createBtn.addEventListener('click', () => {
      const nameInput = document.getElementById('playlist-name');
      const name = nameInput.value.trim();
      if(!name) return alert("Please enter a playlist name.");
      const newPlaylist = { name, songs: [] };
      playlists.push(newPlaylist);
      renderPlaylists();
      nameInput.value = '';
    });

    function renderPlaylists() {
      playlistsContainer.innerHTML = '';
      playlists.forEach((pl, index) => {
        const plDiv = document.createElement('div');
        plDiv.className = 'playlist';

        // Playlist title
        const title = document.createElement('h2');
        title.textContent = pl.name;
        plDiv.appendChild(title);

        // Song input
        const songInput = document.createElement('input');
        songInput.type = 'text';
        songInput.placeholder = 'Song name';
        plDiv.appendChild(songInput);

        const addSongBtn = document.createElement('button');
        addSongBtn.textContent = 'Add Song';
        plDiv.appendChild(addSongBtn);

        // Song list
        const songList = document.createElement('div');
        plDiv.appendChild(songList);

        // Add song event
        addSongBtn.addEventListener('click', () => {
          const songName = songInput.value.trim();
          if(!songName) return;
          pl.songs.push(songName);
          songInput.value = '';
          updateSongList();
        });

        function updateSongList() {
          songList.innerHTML = '';
          pl.songs.forEach((song, i) => {
            const songDiv = document.createElement('div');
            songDiv.className = 'song-item';
            songDiv.textContent = `${i+1}. ${song}`;
            songList.appendChild(songDiv);
          });
        }

        playlistsContainer.appendChild(plDiv);
      });
    }
  </script>
