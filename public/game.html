<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guess the Plot</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://use.typekit.net/xzh5et g.css" />
</head>

<body>
  <header>
    <!-- SAME Profile ▼ dropdown used on other pages -->
    <div class="profile-menu">
      <button id="profileButton" onclick="toggleProfileMenu()">
        <span id="currentUser">Profile</span> ▼
      </button>

      <div id="profileDropdown" class="profile-dropdown">
        <input
          id="usernameInput"
          placeholder="Enter name"
          autocomplete="new-password"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"
          name="profile_name_input_game"
        />
        <button onclick="saveUser()">Save Profile</button>

        <hr />
        <p>Theme</p>
        <button onclick="setTheme('light')">Light</button>
        <button onclick="setTheme('dark')">Dark</button>

        <hr />
        <button onclick="logout()">Sign Out</button>
      </div>
    </div>

    <h1>everything books!</h1>

  <nav>
    <a href="index.html" class="active">Intro</a>
    <a href="authors.html">Best Authors</a>
    <a href="books.html">Book List</a>
    <a href="game.html">Guess Game!</a>
    <a href="bookstores.html">Bookstores</a>
    <a href="aesthetics_gallery.html">Gallery</a>
    <a href="playlists.html">Playlist Maker!</a>
  </nav>
  </header>

  <main>
    <section class="card">
      <!-- The question/prompt -->
      <h2 id="bg-question">In what book does the Main character investigate a murder?</h2>

      <!-- Three options -->
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin:12px 0;">
        <button id="bg-opt1" type="button" onclick="bookGame_submitGuess(0)">Harry Potter</button>
        <button id="bg-opt2" type="button" onclick="bookGame_submitGuess(1)">Divine Rivals</button>
        <button id="bg-opt3" type="button" onclick="bookGame_submitGuess(2)">A Good Girl's Guide to Murder</button>
      </div>

      <!-- Feedback + Score -->
      <p id="bg-feedback" style="min-height:1.4em;"></p>
      <div style="display:flex; gap:14px; align-items:center; margin-top:10px;">
        <button type="button" onclick="bookGame_resetScore()">Reset Score</button>
        <strong id="bg-score">Score: 0</strong>
      </div>

      <hr style="margin:18px 0; opacity:.4;" />
    </section>
  </main>

  <script src="script.js"></script>

  <footer>Reading Portfolio Final Project</footer>
</body>
</html>
