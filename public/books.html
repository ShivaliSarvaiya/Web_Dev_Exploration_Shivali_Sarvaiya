<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Book List</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://use.typekit.net/xzh5etg.css" />
</head>

<body>
  <header>
    <!-- SAME dropdown UI as index.html -->
    <div class="profile-menu">
      <button id="profileButton" onclick="toggleProfileMenu()">
        <span id="currentUser">Profile</span> ▼
      </button>

      <div id="profileDropdown" class="profile-dropdown">
        <input
          id="usernameInput"
          placeholder="Enter name"
          autocomplete="new-password"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"
          name="profile_name_input_books"
        />
        <button onclick="saveUser()">Save Profile</button>

        <hr />
        <p>Theme</p>
        <button onclick="setTheme('light')">Light</button>
        <button onclick="setTheme('dark')">Dark</button>

        <hr />
        <button onclick="logout()">Sign Out</button>
      </div>
    </div>

    <h1>everything books!</h1>

    <nav>
<a href="index.html">Intro</a>
    <a href="authors.html">Best Authors</a>
    <a href="books.html" class="active">Book List</a>
    <a href="game.html">Guess Game!</a>
    <a href="bookstores.html">Bookstores</a>
    <a href="aesthetics_gallery.html">Gallery</a>
    <a href="playlists.html">Playlist Maker!</a>
</nav>
  </header>

  <main>
    <div class="card">
      <h2>Add a Book</h2>

      <input id="title" placeholder="Title" />
      <input id="genre" placeholder="Genre" />
      <input id="image" placeholder="Image URL" />

      <select id="list">
        <option value="to-read">To Read</option>
        <option value="read">Have Read</option>
        <option value="favorites">Favorites</option>
      </select>

      <button type="button" onclick="addBook()">Add Book</button>
    </div>

    <div id="books"></div>
  </main>

  <!-- Shared client logic (profile + theme + books) -->
  <script src="script.js"></script>

  <!-- Page-local helper to render books on load (safe if script.js already does it) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof loadBooks === "function") loadBooks();
    });
  </script>
</body>
</html>
